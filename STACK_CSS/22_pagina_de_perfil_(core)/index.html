<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Yhojans Silva">
    <link rel="stylesheet" href="static/css/style.css">
    <title>Perfil</title>
</head>

<body>

    <header>
        <nav>
            <h1>Perfil</h1>

            <ul>
                <li>Inicio</li>
                <li>Mi perfil</li>
                <li>Conexiones</li>
                <li><button>Cerrar sesión</button></li>
            </ul>
        </nav>
    </header>

    <main>

        <div class="perfil">

            <div class="header-perfil">
                <img class="foto-perfil" src="static/images/imagen.jpg" alt="Foto de perfil">
            </div>

            <div class="contenido-perfil">
                

                <h2>Jane Doe</h2>

                <p class="noruega">Bergen, Noruega</p>

                <p>Desarrolladora Frontend</p>

                <p>Conocimientos en HTML, CSS y JavaScript</p>

                <a href="#">⚙️ Editar perfil</a>
            </div>

        </div>

        <section class="sidebar">

            <div class="row">

                <div class="titulo">
                    <h3>Solicitudes de conexión</h3>
                    <button>Ver todas</button>
                </div>

                <div class="usuario">
                    <img src="static/images/imagen.jpg" alt="">
                    <span>Steve Jobs</span>
                    <img class="aceptar" src="static/images/4315445.png" alt="">
                    <img class="cerrar" src="static/images/signs-close-icon-png.webp" alt="">
                </div>

                <div class="usuario">
                    <img src="static/images/imagen.jpg" alt="">
                    <span>Bill Gates</span>
                    <img class="aceptar" src="static/images/4315445.png" alt="">
                    <img class="cerrar" src="static/images/signs-close-icon-png.webp" alt="">
                </div>

            </div>

            <div class="row">

                <div class="titulo">
                    <h3>Tus conexiones</h3>
                    <button>Ver todas</button>
                </div>

                <div class="usuario">
                    <img src="static/images/imagen.jpg" alt="">
                    <span>Richard Stallman</span>
                </div>

                <div class="usuario">
                    <img src="static/images/imagen.jpg" alt="">
                    <span>Linus Torvalds</span>
                </div>

                <div class="usuario">
                    <img src="static/images/imagen.jpg" alt="">
                    <span>Ada Lovelace</span>
                </div>

                <div class="usuario">
                    <img src="static/images/imagen.jpg" alt="">
                    <span>Grace Hopper</span>
                </div>

            </div>

        </section>

    </main>

</body>
</html>
