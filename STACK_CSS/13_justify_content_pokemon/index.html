<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Ariel faundez">
    <title>Justificar contenido con flexbox</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <div class="container">
        <div class="titulo">
            <h2>justify content: flex-start</h2>
        </div>
        <div class="images flex-start">
            <img src="static/images/pikachu.png" alt="Pikachu">
            <img src="static/images/bulbasaur.png" alt="Bulbasaur">
            <img src="static/images/charmander.png" alt="Charmander">
            <img src="static/images/squirtle.png" alt="Squirtle">
        </div>
    </div>
    <div class="container">
        <div class="titulo">
            <h2>justify content: center</h2>
        </div>
        <div class="images center">
            <img src="static/images/pikachu.png" alt="Pikachu">
            <img src="static/images/bulbasaur.png" alt="Bulbasaur">
            <img src="static/images/charmander.png" alt="Charmander">
            <img src="static/images/squirtle.png" alt="Squirtle">
        </div>
    </div>
    <div class="container">
        <div class="titulo">
            <h2>justify content: flex-end</h2>
        </div>
        <div class="images flex-end">
            <img src="static/images/pikachu.png" alt="Pikachu">
            <img src="static/images/bulbasaur.png" alt="Bulbasaur">
            <img src="static/images/charmander.png" alt="Charmander">
            <img src="static/images/squirtle.png" alt="Squirtle">
        </div>
    </div>
    <div class="container">
        <div class="titulo">
            <h2>justify content: space-between</h2>
        </div>
        <div class="images space-between">
            <img src="static/images/pikachu.png" alt="Pikachu">
            <img src="static/images/bulbasaur.png" alt="Bulbasaur">
            <img src="static/images/charmander.png" alt="Charmander">
            <img src="static/images/squirtle.png" alt="Squirtle">
        </div>
    </div>
    <div class="container">
        <div class="titulo">
            <h2>justify content: space-around</h2>
        </div>
        <div class="images space-around">
            <img src="static/images/pikachu.png" alt="Pikachu">
            <img src="static/images/bulbasaur.png" alt="Bulbasaur">
            <img src="static/images/charmander.png" alt="Charmander">
            <img src="static/images/squirtle.png" alt="Squirtle">
        </div>
    </div>
        <div class="container">
        <div class="titulo">
            <h2>justify content: space-evenly</h2>
        </div>
        <div class="images space-evenly">
            <img src="static/images/pikachu.png" alt="Pikachu">
            <img src="static/images/bulbasaur.png" alt="Bulbasaur">
            <img src="static/images/charmander.png" alt="Charmander">
            <img src="static/images/squirtle.png" alt="Squirtle">
        </div>
    </div>
</body>

</html>
