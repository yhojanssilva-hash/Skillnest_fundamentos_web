<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Crear una cuenta en Discord</title>
</head>

<body>
    <h1>Crear una cuenta en Discord</h1>

    <form>
        <div>
            Nombre:
            <input type="text" name="Nombre" required> <br><br>
        </div>
        <div>
            Apellido:
            <input type="text" name="Apellido" required> <br><br>
        </div>
        <div>
            Correo electronico:
            <input type="text" name="Correo" required> <br><br>
        </div>

        <div>
            Contraseña:
            <input type="password" name="Contraseña" required> <br><br>
        </div>
        <div>
            Confirmar contraseña:
            <input type="password" name="Confirmar" required> <br><br>
        </div>

        Fecha nacimiento:
        <input type="date" name="fecha" required> <br><br>
        Genero:
        <div>
            <input type="radio" name="genero" value="masculino" required> Masculino
            <input type="radio" name="genero" value="femenino" required> Femenino
            <input type="radio" name="genero" value="Prefiero no decirlo" required>Prefiero no decirlo
            <br>
            Descripción sobre ti:<br>
            <textarea rows="4" cols="40"></textarea>
            <br><br>
        </div>

        Selecciona tus intereses:<br>
        <select size="4">
            <option>Música</option>
            <option>Películas</option>
            <option>Deportes</option>
            <option>Tecnología</option>
        </select>
        <br><br>
        <input type="checkbox">
        Al registrarte, aceptas los términos y condiciones de Discord.
        <br><br>

        <input type="submit" value="Registrarse">

    </form>
</body>

</html>
