<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Crear una cuenta en Discord</title>
</head>

<body>

    <h1>Crear una cuenta en Discord</h1>

    <form>

        <div>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="Nombre" required>
        </div>
        <br>

        <div>
            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" name="Apellido" required>
        </div>
        <br>

        <div>
            <label for="correo">Correo electrónico:</label>
            <input type="email" id="correo" name="Correo" required>
        </div>
        <br>

        <div>
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="Contraseña" required>
        </div>
        <br>

        <div>
            <label for="confirmar">Confirmar contraseña:</label>
            <input type="password" id="confirmar" name="Confirmar" required>
        </div>
        <br>

        <div>
            <label for="fecha">Fecha nacimiento:</label>
            <input type="date" id="fecha" name="fecha" required>
        </div>
        <br>

        <div>
            <p>Género:</p>

            <label>
                <input type="radio" name="genero" value="masculino" required> Masculino
            </label><br>

            <label>
                <input type="radio" name="genero" value="femenino" required> Femenino
            </label><br>

            <label>
                <input type="radio" name="genero" value="Prefiero no decirlo" required> Prefiero no decirlo
            </label>
        </div>

        <br>

        <div>
            <label for="descripcion">Descripción sobre ti:</label><br>
            <textarea id="descripcion" rows="4" cols="40"></textarea>
        </div>

        <br>

        <div>
            <label for="intereses">Selecciona tus intereses:</label><br>
            <select id="intereses" size="4">
                <option>Música</option>
                <option>Películas</option>
                <option>Deportes</option>
                <option>Tecnología</option>
            </select>
        </div>

        <br>

        <div>
            <label>
                <input type="checkbox" required>
                Al registrarte, aceptas los términos y condiciones de Discord.
            </label>
        </div>

        <br>

        <input type="submit" value="Registrarse">

    </form>

</body>

</html>
