    <!--Tarea:crear una lista ordenada <ol> para tareas pendientes  (8 elementos) (ejemplo:regar plantas, etc.)-->
    
        <!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Document</title>
        </head>
        <body>
            <h1>Listas</h1>
            <hr>
                <h2>Lista desordenada</h2>
            
            <ul>
                <li>Frutas</li>
                <li>Lacteos</li>
                <li>Verduras</li>
                <li>Carne</li>
                <li>Pan</li>
                <li>Huevos</li>
                <li>Bebidas</li>
                <li>Snacks</li>
            </ul>
            <hr>
            <h2>Lista ordenada</h2>
            <ol>
                <li>Regar plantas</li>
                <li>Hacer la cama</li>
                <li>Lavar la ropa</li>
                <li>Estudiar</li>
                <li>Limpiar la casa</li>
                <li>Comprar comida</li>
                <li>Hacer ejercicio</li>
                <li>Leer algun libro</li>
            </ol>
        </body>
        </html>
